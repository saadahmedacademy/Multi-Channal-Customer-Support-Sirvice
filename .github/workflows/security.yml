name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Scan Python dependencies
        run: pip-audit -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Scan Node.js dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=high || true

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: trufflehog
        name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.95.6
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Check TruffleHog results
        if: always()
        run: |
          if [ "${{ steps.trufflehog.outcome }}" == "failure" ]; then
            echo "⚠️ TruffleHog found potential secrets — review manually"
          else
            echo "✅ No secrets detected"
          fi

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r backend/ -f json -o bandit-report.json || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, sast]
    if: always()

    steps:
      - name: Check security scan results
        run: |
          if [ "${{ needs.dependency-scan.result }}" != "success" ] || \
           [ "${{ needs.sast.result }}" != "success" ]; then
            echo "⚠️ Some security scans failed or found issues"
            exit 1
          else
            echo "✅ All security scans passed"
          fi
