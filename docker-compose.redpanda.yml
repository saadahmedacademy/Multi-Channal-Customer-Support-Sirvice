# Redpanda - Ultra-light single-node for 4GB RAM systems
# Per Constitution: Minimal infrastructure, no heavy orchestration
# Memory: 512MB max, 1 core, no Console UI to save resources

version: '3.8'

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --memory
      - 512M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      # Kafka port for clients
      - 9092:9092
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    restart: unless-stopped
    # No healthcheck to reduce overhead
    # No Console UI - use rpk CLI or direct Kafka connection

volumes:
  redpanda_data:
    driver: local
