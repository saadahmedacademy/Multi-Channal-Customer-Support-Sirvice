# Docker Compose for Staging Environment
# Uses different ports to avoid conflicts with local development

version: '3.8'

services:
  # Backend API on port 8002
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ai-support-backend-staging
    ports:
      - "8002:8000"  # Map host 8002 to container 8000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - META_WHATSAPP_TOKEN=${META_WHATSAPP_TOKEN}
      - META_WHATSAPP_PHONE_ID=${META_WHATSAPP_PHONE_ID}
      - WHATSAPP_APP_SECRET=${WHATSAPP_APP_SECRET}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
      - INTERNAL_API_KEYS=${INTERNAL_API_KEYS}
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      - ENVIRONMENT=staging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - ai-support-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Message Processor Worker
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.worker
    container_name: ai-support-worker-staging
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - META_WHATSAPP_TOKEN=${META_WHATSAPP_TOKEN}
      - META_WHATSAPP_PHONE_ID=${META_WHATSAPP_PHONE_ID}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
      - ENVIRONMENT=staging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      redpanda:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - ai-support-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import os; exit(0 if os.path.exists(\"/tmp/worker.pid\") else 1)' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redpanda - Message Queue (shared with local dev)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: ai-support-redpanda
    command:
      - redpanda
      - start
      - --smp
      - '1'
      - --memory
      - 512M
      - --overprovisioned
      - --node-id
      - '0'
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - redpanda:33145
    ports:
      - "9092:9092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - ai-support-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  ai-support-network:
    driver: bridge

volumes:
  redpanda_data:
    driver: local
